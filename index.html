<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Weaver | Intuitive Visual Mind Mapping</title>
    <meta name="description" content="Create, organize, and share beautiful mind maps instantly in your browser. 100% local, auto-organized, and keyboard-friendly." />

    <!-- Open Graph -->
    <meta property="og:title" content="Mind Weaver | Intuitive Visual Mind Mapping" />
    <meta property="og:description" content="Create, organize, and share beautiful mind maps instantly in your browser. 100% local, auto-organized, and keyboard-friendly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mind Weaver | Intuitive Visual Mind Mapping" />
    <meta name="twitter:description" content="Create, organize, and share beautiful mind maps instantly in your browser. 100% local, auto-organized, and keyboard-friendly." />
    <meta name="twitter:image" content="/og-image.png" />

    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
